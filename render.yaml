services:
  - type: web
    name: yango_crm2
    env: node
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /data
    disk:
      name: yango-crm-data
      mountPath: /data
      sizeGB: 1
